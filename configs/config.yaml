# ── configs/config.yaml ─────────────────────────────────────────────────────

app:
  name: "Agentic RAG System"
  version: "1.0.0"
  environment: ${ENVIRONMENT:-development}
  log_level: ${LOG_LEVEL:-INFO}

api:
  host: "0.0.0.0"
  port: 8080
  workers: 1
  timeout: 120

llm:
  provider: openai          # openai | huggingface
  model: gpt-4o
  temperature: 0.0
  max_tokens: 1024
  request_timeout: 60
  max_retries: 3

embeddings:
  model: text-embedding-3-small
  batch_size: 32
  dimensions: 1536

retrieval:
  top_k: 5
  score_threshold: 0.35
  hybrid_alpha: 0.7          # weight for dense vs sparse (1.0 = dense only)
  vectorstore_path: data/vectorstore
  bm25_index_path: data/vectorstore/bm25_index.pkl

chunking:
  chunk_size: 512
  chunk_overlap: 64
  separators: ["\n\n", "\n", ". ", " "]

agents:
  max_iterations: 6
  verbose: true
  tools:
    - retriever
    - calculator
    - web_search

guardrails:
  enable_toxicity_check: true
  toxicity_threshold: 0.7
  enable_hallucination_check: true
  faithfulness_threshold: 0.5
  enable_bias_check: true
  enable_pii_scrub: true

evaluation:
  eval_dataset_path: data/processed/eval_set.jsonl
  metrics:
    - faithfulness
    - answer_relevancy
    - context_precision
    - context_recall

s3:
  bucket: ${S3_BUCKET_NAME:-agentic-rag-docs}
  prefix: documents/
  supported_formats: [pdf, txt, docx, md]
